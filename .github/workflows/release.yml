name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # scoped to this job only — needed for gh release create
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history required: gh release create reads tag history

      - name: Install pdflatex
        # cm-super provides scalable Type 1 Computer Modern fonts required
        # by microtype's font-expansion feature.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            cm-super

      - name: Build PDFs (two-pass each)
        run: |
          cd docs/specifications
          pdflatex -interaction=nonstopmode claude-sdk-specification.tex
          pdflatex -interaction=nonstopmode claude-sdk-specification.tex
          pdflatex -interaction=nonstopmode claude-sdk-specification-pharo-notes.tex
          pdflatex -interaction=nonstopmode claude-sdk-specification-pharo-notes.tex

      - name: Create GitHub Release with PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "${VERSION}" \
            --title "Claude SDK for Pharo ${VERSION}" \
            --notes-file CHANGELOG.md \
            docs/specifications/claude-sdk-specification.pdf \
            docs/specifications/claude-sdk-specification-pharo-notes.pdf
